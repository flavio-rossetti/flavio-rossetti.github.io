<!doctype html>
<html class="h-100" lang="en-us" data-bs-theme="dark">
  <head>
  
  <script>
    (function () {
      var hour = new Date().getHours();
      document.documentElement.setAttribute("data-bs-theme", hour >= 7 && hour < 19 ? "light" : "dark");
    }());
  </script>
  
  {% include head.html %}


  </head>
  <body>

    <header>
      <nav class="site-nav" aria-label="Primary navigation">
        <div class="container-fluid">
          <ul class="site-nav-list">
            <li>
              <a class="site-nav-link {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}" href="/index.html">Home</a>
            </li>
            <li>
              <a class="site-nav-link {% if page.url == '/cv.html' %}active{% endif %}" href="/cv.html">CV</a>
            </li>
            <li>
              <a class="site-nav-link {% if page.url == '/research.html' %}active{% endif %}" href="/research.html">Research</a>
            </li>
            <li>
              <a class="site-nav-link {% if page.url == '/talks.html' %}active{% endif %}" href="/talks.html">Talks</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="container">
      <div class="row">



        {{ content }}

        
        
      </div>
    </div>
  
  
  

  </body>
</html>
